name: OMS Global Sentinel

on:
  push:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update_oms_data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codice
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Installa dipendenze
        run: pip install requests
        
      - name: Download Notizie Verificate OMS
        run: python sentinel.py
        
      - name: Push dati su GitHub
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🧬 OMS Update: Rilevati nuovi focolai verificati"
          file_pattern: "safety_feed.json"
